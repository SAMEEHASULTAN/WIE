<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills - ReLaunchHer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-rocket" style="color: var(--primary);"></i>
                <span>ReLaunchHer</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="career-restart.html">
                    <i class="fas fa-briefcase"></i>
                    <span>Career Restart</span>
                </a>
                <a href="business-generator.html">
                    <i class="fas fa-lightbulb"></i>
                    <span>Business Generator</span>
                </a>
                <a href="roadmap.html">
                    <i class="fas fa-road"></i>
                    <span>Learning Roadmap</span>
                </a>
                <a href="skills.html" class="active">
                    <i class="fas fa-code"></i>
                    <span>Skills</span>
                </a>
                <a href="community.html">
                    <i class="fas fa-users"></i>
                    <span>Community</span>
                </a>
                <a href="#" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Header -->
            <header class="dashboard-header">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search skills...">
                </div>
                <div class="profile-menu" id="profile-menu">
                    <div class="profile-avatar" id="profile-avatar">JD</div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </header>

            <!-- Skills Content -->
            <div class="page-header">
                <h1>Skills Management</h1>
                <p>Track and manage your skills</p>
            </div>

            <!-- Add Skill Form -->
            <div class="add-skill-section">
                <div class="add-skill-card">
                    <h2>Add New Skill</h2>
                    <div class="form-row">
                        <div class="form-group half">
                            <label>Skill Name</label>
                            <input type="text" id="skill-name" placeholder="e.g., Python, Marketing">
                        </div>
                        <div class="form-group half">
                            <label>Category</label>
                            <select id="skill-category">
                                <option value="Technical">Technical</option>
                                <option value="Soft Skills">Soft Skills</option>
                                <option value="Creative">Creative</option>
                                <option value="Business">Business</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Proficiency Level</label>
                        <div class="level-selector">
                            <label class="level-option">
                                <input type="radio" name="skill-level" value="Beginner" checked>
                                <span>Beginner</span>
                            </label>
                            <label class="level-option">
                                <input type="radio" name="skill-level" value="Intermediate">
                                <span>Intermediate</span>
                            </label>
                            <label class="level-option">
                                <input type="radio" name="skill-level" value="Advanced">
                                <span>Advanced</span>
                            </label>
                        </div>
                    </div>
                    <button class="btn-primary" id="add-skill">
                        <i class="fas fa-plus"></i>
                        Add Skill
                    </button>
                </div>
            </div>

            <!-- Skills Grid -->
            <div class="skills-section">
                <h2>Your Skills</h2>
                <div class="skills-grid" id="skills-grid">
                    <!-- Skills will be populated by JS -->
                </div>
            </div>

            <!-- Skill Categories Overview -->
            <div class="categories-section">
                <h2>Skills by Category</h2>
                <div class="categories-grid" id="categories-grid">
                    <!-- Categories will be populated by JS -->
                </div>
            </div>

            <!-- Edit Skill Modal -->
            <div id="edit-skill-modal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>Edit Skill</h2>
                    <form id="edit-skill-form">
                        <input type="hidden" id="edit-skill-id">
                        <div class="form-group">
                            <label>Skill Name</label>
                            <input type="text" id="edit-skill-name" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="edit-skill-category">
                                <option value="Technical">Technical</option>
                                <option value="Soft Skills">Soft Skills</option>
                                <option value="Creative">Creative</option>
                                <option value="Business">Business</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Proficiency Level</label>
                            <div class="level-selector">
                                <label class="level-option">
                                    <input type="radio" name="edit-skill-level" value="Beginner">
                                    <span>Beginner</span>
                                </label>
                                <label class="level-option">
                                    <input type="radio" name="edit-skill-level" value="Intermediate">
                                    <span>Intermediate</span>
                                </label>
                                <label class="level-option">
                                    <input type="radio" name="edit-skill-level" value="Advanced">
                                    <span>Advanced</span>
                                </label>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Update Skill</button>
                            <button type="button" class="btn-secondary" id="delete-skill">Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/skills.js"></script>
</body>
</html>
